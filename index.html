<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 앞 등하굣길 안전 우회 안내</title>
    <style>
        /* CSS : 운전자가 멀리서도 한눈에 알아볼 수 있는 직관적인 UI */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
            padding: 28px 24px;
            text-align: center;
        }

        .header {
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.4rem;
            color: #191f28;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 0.9rem;
            color: #8b95a1;
        }

        /* 상태 알림 판 */
        .status-box {
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        /* 정상 통행 상태 */
        .status-normal {
            background-color: #e8f7ee;
            border: 2px solid #28a745;
            color: #1e7e34;
        }

        /* 차단 / 우회 상태 */
        .status-detour {
            background-color: #ffeeee;
            border: 2px solid #dc3545;
            color: #bd2130;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        .status-icon {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        .status-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .status-desc {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
        }

        /* 시뮬레이션용 버튼 및 제어판 */
        .control-panel {
            background: #f9fafb;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #e5e8eb;
        }

        .control-panel label {
            display: block;
            font-size: 0.85rem;
            color: #6b7684;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 14px 0;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-normal {
            background-color: #28a745;
            color: white;
        }

        .btn-normal:hover {
            background-color: #218838;
        }

        .btn-detour {
            background-color: #dc3545;
            color: white;
        }

        .btn-detour:hover {
            background-color: #c82333;
        }

        .audio-notice {
            margin-top: 16px;
            font-size: 0.8rem;
            color: #abb0b7;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="header">
            <h1>🏫 학교 앞 등하굣길 교통안내</h1>
            <p>실시간 도로 차단 상황 음성 안내 서비스</p>
        </div>

        <!-- 상태 표시판 -->
        <div id="statusBox" class="status-box status-normal">
            <div id="statusIcon" class="status-icon">🚗</div>
            <div id="statusTitle" class="status-title">통행 가능</div>
            <div id="statusDesc" class="status-desc">현재 서행하여 일방통행로 진입이 가능합니다.</div>
        </div>

        <!-- 테스트/시뮬레이션 제어기 -->
        <div class="control-panel">
            <label>⚙️ 교통 상황 시뮬레이션 (테스트용)</label>
            <div class="btn-group">
                <button class="btn btn-normal" onclick="setStatus('normal')">원활 (진입)</button>
                <button class="btn btn-detour" onclick="setStatus('detour')">혼잡 (차단/우회)</button>
            </div>
        </div>

        <p class="audio-notice">💡 화면을 누르거나 버튼을 클릭하면 음성 안내가 출력됩니다.</p>
    </div>

    <script>
        // JS : 음성 출력(Web Speech API) 및 상태 변경 로직
        
        // Web Speech API의 SpeechSynthesisUtterance 객체 생성
        const synth = window.speechSynthesis;

        // UI 요소 가져오기
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusTitle = document.getElementById('statusTitle');
        const statusDesc = document.getElementById('statusDesc');

        /**
         * 음성(TTS)으로 텍스트를 읽어주는 함수
         * @param {string} text - 안내할 메시지
         */
        function speak(text) {
            // 기존에 재생 중인 음성이 있다면 중단
            if (synth.speaking) {
                synth.cancel();
            }

            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = 'ko-KR'; // 한국어 설정
            utterThis.rate = 0.95;   // 명확하게 전달하기 위해 속도를 살짝 낮춤 (1.0 기준)
            utterThis.pitch = 1.0;   // 음높이

            synth.speak(utterThis);
        }

        /**
         * 교통 상황에 따라 앱 UI 및 음성을 변경하는 함수
         * @param {string} state - 'normal' 또는 'detour'
         */
        function setStatus(state) {
            if (state === 'detour') {
                // 차단 및 우회 상태
                statusBox.className = 'status-box status-detour';
                statusIcon.textContent = '⛔';
                statusTitle.textContent = '차단중 - 우회하세요';
                statusDesc.textContent = '현재 등하교 시간으로 혼잡합니다.\n큰 도로로 우회하여 주십시오.';

                // 음성 안내 실행
                speak('등하교 시간 차량 밀집으로 일방통행로가 차단되었습니다. 큰 도로로 우회하여 주시기 바랍니다.');
            } else {
                // 정상 통행 상태
                statusBox.className = 'status-box status-normal';
                statusIcon.textContent = '🚗';
                statusTitle.textContent = '통행 가능';
                statusDesc.textContent = '현재 서행하여 일방통행로 진입이 가능합니다.';

                // 음성 안내 실행
                speak('현재 서행하여 일방통행로 진입이 가능합니다.');
            }
        }
    </script>
</body>
</html>
